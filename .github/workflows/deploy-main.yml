name: Publish Test Page

on:
  push:
    branches:
      - develop
      - r/*.x

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: determine the correct test server
        run: echo "VITE_TEST_SERVER_URL=`./.github/get-release-server.sh ${{ github.ref_name }}`" >> GITHUB_ENV

  build:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: get node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: download dependencies
        run: npm ci

      - name: build project
        env:
          NODE_ENV: development
          VITE_TEST_SERVER_AUTH: "admin:opencast"
        run: npm run build

      - name: Prepare git
        run: |
          git config --global user.name "Release Bot"
          git config --global user.email "cloud@opencast.org"

      - name: Prepare GitHub SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          install -dm 700 ~/.ssh/
          echo "${DEPLOY_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone repository
        run: |
          git clone "git@github.com:gregorydlogan/opencast-admin-interface.git" ~/admin-interface-clone
          cd ~/admin-interface-clone
          git checkout gh-pages

      - name: Commit new version
        run: |
          #Temp becomes something like r/17.x
          export TEMP=${{ github.ref_name }}
          #Strip the r/ prefix, giving us just 17.x.  If this is main/develop this does nothing
          export TARGET=~/admin-interface-clone/${TEMP#r\/}
          # Update gh-pages
          rm -rf $TARGET
          mkdir -p $TARGET
          cp -r build/* $TARGET
          # Add the new build to the repo
          cd ~/admin-interface-clone
          #Generate an index, in case anyone lands at the root of the test domain
          echo '<html><body><ul>' > index.html
          find . -mindepth 1 -maxdepth 1 -type d \
            | grep -v .git \
            | sort -r \
            | sed 's/^\(.*\)$/<li><a href=\1>\1<\/a><\/li>/' >> index.html
          echo '</ul></body></html>' >> index.html
          git add ./*
          git diff --staged --quiet || git amend -m "Build $(date)"

      - name: Push updates
        run: |
          cd ~/admin-interface-clone
          git push origin gh-pages --force
